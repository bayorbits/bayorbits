<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Star Chart</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="stage" aria-hidden="true"></canvas>

    <div id="ui-root" class="ui-root">
      <aside id="settings-panel" class="glass-panel settings-panel" aria-label="Settings and reference"></aside>

      <div id="split-divider" class="split-divider" role="separator" aria-orientation="horizontal" tabindex="0" aria-label="Resize visualization and chat"></div>

      <section id="chat-panel" class="glass-panel chat-panel" aria-label="Simulated educational chat">
        <header class="chat-header">
          <button id="settings-toggle" class="btn" type="button" aria-expanded="false">Settings</button>
          <div>
            <h1>LLM Star Chart</h1>
            <p class="subtitle">Educational simulation of chat and model-like geometry</p>
          </div>
        </header>

        <div id="chat-log" class="chat-log" aria-live="polite"></div>

        <div class="composer-wrap">
          <label for="prompt-input" class="sr-only">Prompt input</label>
          <textarea id="prompt-input" rows="3" placeholder="Type a learning prompt to start the simulation..."></textarea>

          <div class="control-cluster" aria-label="Simulation controls">
            <button id="send-btn" class="btn btn-primary" type="button">Send / Start</button>
            <button id="continue-btn" class="btn" type="button" disabled>Continue</button>
            <button id="pause-btn" class="btn" type="button">Pause</button>
            <button id="reset-btn" class="btn" type="button">Reset</button>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
